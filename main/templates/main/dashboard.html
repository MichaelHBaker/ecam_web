<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .region-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0.5rem;
        }
        .icon-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .icon-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            color: inherit;
            transition: color 0.2s;
        }
        .icon-button:hover {
            color: #0d6efd;
        }
        .accordion-button::after {
            margin-left: 0.5rem;
        }
        .accordion-body {
            transition: height 0.3s ease-in-out;
        }
        .region-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .loading-spinner {
            display: flex;
            justify-content: center;
            padding: 2rem;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'index' %}">
                <i class="bi bi-house"></i> Home
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'dashboard' %}">
                            <i class="bi bi-grid-3x3-gap"></i> Dashboard
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        <div class="accordion" id="dashboardAccordion">
            {% for region in regions %}
            <div class="accordion-item">
                <h2 class="accordion-header" id="heading{{ region.id }}">
                    <button class="accordion-button {% if region.is_closed %}collapsed{% endif %}" 
                            type="button" 
                            data-bs-toggle="collapse" 
                            data-bs-target="#collapse{{ region.id }}" 
                            aria-expanded="{% if not region.is_closed %}true{% else %}false{% endif %}"
                            aria-controls="collapse{{ region.id }}">
                        <div class="region-header">
                            <div class="region-title">
                                <i class="{{ region.icon }}"></i>
                                <span>{{ region.title }}</span>
                            </div>
                            <div class="icon-group">
                                <button type="button" 
                                        class="icon-button" 
                                        onclick="setMode('{{ region.id }}', 'standard'); event.stopPropagation();" 
                                        title="Standard View">
                                    <i class="bi bi-aspect-ratio"></i>
                                </button>
                                <button type="button" 
                                        class="icon-button" 
                                        onclick="setMode('{{ region.id }}', 'close'); event.stopPropagation();" 
                                        title="Close">
                                    <i class="bi bi-x-circle"></i>
                                </button>
                                <a href="{% url 'full_region' region.id %}" 
                                   class="icon-button"
                                   target="_blank"
                                   rel="noopener noreferrer"
                                   onclick="event.stopPropagation();"
                                   title="Full Screen">
                                    <i class="bi bi-arrows-fullscreen"></i>
                                </a>
                            </div>
                        </div>
                    </button>
                </h2>
                <div id="collapse{{ region.id }}" 
                     class="accordion-collapse collapse {% if not region.is_closed %}show{% endif %}" 
                     aria-labelledby="heading{{ region.id }}" 
                     data-bs-parent="#dashboardAccordion">
                    <div id="body{{ region.id }}" 
                         class="accordion-body"
                         data-content-url="{% url 'region_content' region.id %}"
                         style="{% if region.is_closed %}height:0px; overflow:hidden;{% else %}height: calc(100vh - 150px); overflow-y: auto;{% endif %}">
                        <div class="loading-spinner">
                            <i class="bi bi-arrow-repeat spin"></i> Loading...
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Initialize content loading for open regions
        document.addEventListener('DOMContentLoaded', function() {
            {% for region in regions %}
                {% if not region.is_closed %}
                loadRegionContent('{{ region.id }}');
                {% endif %}
            {% endfor %}
        });

        function loadRegionContent(regionId) {
            const bodyElement = document.getElementById(`body${regionId}`);
            const contentUrl = bodyElement.dataset.contentUrl;
            
            fetch(contentUrl)
                .then(response => response.text())
                .then(html => {
                    bodyElement.innerHTML = html;
                })
                .catch(error => {
                    bodyElement.innerHTML = `
                        <div class="alert alert-danger" role="alert">
                            <i class="bi bi-exclamation-triangle"></i> Error loading content
                        </div>`;
                    console.error('Error:', error);
                });
        }

        function setMode(regionId, mode) {
            const collapse = document.querySelector(`#collapse${regionId}`);
            const body = document.querySelector(`#body${regionId}`);
            const button = document.querySelector(`button[data-bs-target="#collapse${regionId}"]`);
            const bsCollapse = bootstrap.Collapse.getInstance(collapse);
            
            // Update server state
            fetch('{% url "update_region_state" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({
                    region_id: regionId,
                    mode: mode
                })
            });
            
            switch (mode) {
                case 'close':
                    if (bsCollapse) {
                        bsCollapse.hide();
                    }
                    body.style.height = '0px';
                    body.style.overflow = 'hidden';
                    button.classList.add('collapsed');
                    button.setAttribute('aria-expanded', 'false');
                    break;
                    
                case 'standard':
                    if (bsCollapse) {
                        bsCollapse.show();
                    }
                    body.style.height = 'calc(100vh - 150px)';
                    body.style.overflow = 'auto';
                    button.classList.remove('collapsed');
                    button.setAttribute('aria-expanded', 'true');
                    // Load content if not already loaded
                    if (!body.querySelector('.content-loaded')) {
                        loadRegionContent(regionId);
                    }
                    break;
            }
        }

        // Add collapse event listeners
        document.querySelectorAll('.accordion-collapse').forEach(collapse => {
            collapse.addEventListener('show.bs.collapse', function() {
                const regionId = this.id.replace('collapse', '');
                const body = document.querySelector(`#body${regionId}`);
                body.style.height = 'calc(100vh - 150px)';
                body.style.overflow = 'auto';
                if (!body.querySelector('.content-loaded')) {
                    loadRegionContent(regionId);
                }
            });

            collapse.addEventListener('hide.bs.collapse', function() {
                const regionId = this.id.replace('collapse', '');
                const body = document.querySelector(`#body${regionId}`);
                body.style.height = '0px';
                body.style.overflow = 'hidden';
            });
        });
    </script>
</body>
</html>
