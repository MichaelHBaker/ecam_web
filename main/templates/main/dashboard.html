<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-3">
        <div class="accordion" id="dashboardAccordion">
            {% for region in regions %}
            <div class="card">
                <div class="card-header" id="heading{{ region.id }}">
                    <h2 class="mb-0">
                        <button class="btn btn-link btn-block text-left collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse{{ region.id }}" aria-expanded="false" aria-controls="collapse{{ region.id }}">
                            {{ region.title }}
                            <!-- Mode Icons -->
                            <i class="bi bi-x-circle-fill" style="float: right; margin-left: 10px; cursor: pointer;" onclick="setMode('{{ region.id }}', 'close');"></i>
                            <i class="bi bi-aspect-ratio" style="float: right; margin-left: 10px; cursor: pointer;" onclick="setMode('{{ region.id }}', 'standard');"></i>
                            <a href="{% url 'full_region' region.id %}" class="bi bi-arrows-fullscreen" style="float: right; margin-left: 10px; color: inherit; text-decoration: none;"></a>                       
                        </button>
                    </h2>
                </div>

                <div id="collapse{{ region.id }}" class="collapse {% if not region.is_closed %} show {% endif %}" aria-labelledby="heading{{ region.id }}" data-bs-parent="#dashboardAccordion">
                    <div class="card-body" style="{% if region.is_closed %}height:0px; overflow:hidden;{% else %}height: calc(100vh - 150px); overflow-y: auto;{% endif %}">
                        <!-- Dynamic content for {{ region.title }} goes here -->
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function setMode(regionId, mode) {
            const body = document.querySelector('#collapse' + regionId + ' .card-body');
            switch (mode) {
                case 'close':
                    body.style.height = '0px';  // Close the body
                    body.style.overflow = 'hidden';  // Hide overflow content
                    break;
                case 'standard':
                    body.style.height = '200px';  // Standard height, enough to work with content
                    body.style.overflow = 'auto';  // Allow scrolling
                    break;
                case 'full':
                    // Full mode is handled by redirecting to a separate page, not here
                    break;
            }
        }
    </script>
</body>
</html>
