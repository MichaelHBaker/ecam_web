<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locations - Full View</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Leaflet CSS for maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
</head>
<body>
    <nav class="navbar navbar-light bg-light">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-geo-alt"></i> Locations
            </span>
            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        <div class="row">
            <!-- Location List Panel -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Location List</h5>
                            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addLocationModal">
                                <i class="bi bi-plus"></i> Add Location
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="list-group" id="locationList">
                            {% for location in locations %}
                            <a href="#" class="list-group-item list-group-item-action" 
                               data-lat="{{ location.latitude }}" 
                               data-lon="{{ location.longitude }}"
                               onclick="centerMap({{ location.latitude }}, {{ location.longitude }})">
                                <div class="d-flex w-100 justify-content-between">
                                    <h6 class="mb-1">{{ location.name }}</h6>
                                    <small>{{ location.type }}</small>
                                </div>
                                <small>Lat: {{ location.latitude }}, Lon: {{ location.longitude }}</small>
                            </a>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Map Panel -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <div id="map" style="height: calc(100vh - 200px);"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Location Modal -->
    <div class="modal fade" id="addLocationModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Location</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="addLocationForm" method="POST" action="{% url 'add_location' %}">
                    {% csrf_token %}
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Type</label>
                            <select class="form-select" name="type" required>
                                <option value="site">Site</option>
                                <option value="station">Station</option>
                                <option value="facility">Facility</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Latitude</label>
                            <input type="number" class="form-control" name="latitude" step="any" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Longitude</label>
                            <input type="number" class="form-control" name="longitude" step="any" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Add Location</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        // Initialize map
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const markers = {};

        // Add markers for existing locations
        {% for location in locations %}
            markers['{{ location.id }}'] = L.marker([{{ location.latitude }}, {{ location.longitude }}])
                .bindPopup('{{ location.name }}')
                .addTo(map);
        {% endfor %}

        function centerMap(lat, lon) {
            map.setView([lat, lon], 13);
        }
    </script>
</body>
</html>
